{% extends 'base.html' %}
{% block content %}
<style>
  :root{
    --rasho-red:#d60000;
    --rasho-gold:#ffc400;
    --rasho-orange:#ff8700;
    --rasho-cream:#fff1d7;
  }
  .rashoIntroClean{
    position:fixed;
    inset:0;
    z-index:9999;
    display:grid;
    place-items:center;
    overflow:hidden;
    color:white;
    background:
      radial-gradient(circle at 50% 52%, rgba(255,196,0,.10), transparent 28%),
      radial-gradient(circle at 70% 22%, rgba(255,0,0,.18), transparent 25%),
      linear-gradient(145deg,#030303 0%,#240101 52%,#060606 100%);
    transition:opacity .42s ease, visibility .42s ease;
  }
  .rashoIntroClean.is-hidden{opacity:0;visibility:hidden;pointer-events:none}
  .rashoIntroClean::before{
    content:"";
    position:absolute;
    inset:-18%;
    background:repeating-linear-gradient(112deg,
      transparent 0 58px,
      rgba(255,196,0,.08) 59px 62px,
      transparent 63px 114px,
      rgba(255,0,0,.13) 115px 120px,
      transparent 121px 190px
    );
    transform:skewX(-18deg);
    animation:rashoSpeedLines 1.2s linear infinite;
    opacity:.9;
  }
  .rashoIntroClean::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle, transparent 45%, rgba(0,0,0,.82) 100%);
    pointer-events:none;
  }
  .rashoSkip{
    position:absolute;
    top:16px;
    right:16px;
    z-index:5;
    border:1px solid rgba(255,255,255,.22);
    background:rgba(0,0,0,.46);
    color:white;
    padding:10px 15px;
    border-radius:999px;
    font-weight:800;
    cursor:pointer;
    backdrop-filter:blur(10px);
  }
  .rashoIntroStage{
    position:relative;
    z-index:2;
    width:min(94vw,820px);
    height:min(60vh,430px);
    display:grid;
    place-items:center;
  }
  .rashoWord{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:clamp(5px,1vw,13px);
    white-space:nowrap;
    font-family:"Overseer","Overseer Italic","Impact","Arial Black",sans-serif;
    font-size:clamp(50px,13vw,128px);
    font-style:italic;
    font-weight:1000;
    letter-spacing:.09em;
    color:var(--rasho-cream);
    text-transform:uppercase;
    text-shadow:
      0 0 18px rgba(255,196,0,.36),
      0 0 3px rgba(255,255,255,.92),
      0 8px 0 rgba(0,0,0,.58);
  }
  .rashoWord span{
    display:inline-block;
    opacity:0;
    transform:translateX(-28px) translateY(28px) scale(.72) skewX(-12deg);
    filter:blur(4px);
    animation:rashoLetterSmokeIn .42s cubic-bezier(.2,1.12,.25,1) forwards;
    animation-delay:calc(var(--i) * .13s + .12s);
  }
  .rashoWord .space{width:.38em}
  .smokeLayer{
    position:absolute;
    left:50%;
    top:58%;
    width:min(88vw,720px);
    height:120px;
    transform:translateX(-50%);
    pointer-events:none;
  }
  .smoke{
    position:absolute;
    bottom:10px;
    width:70px;
    height:70px;
    border-radius:50%;
    opacity:0;
    filter:blur(8px);
    background:radial-gradient(circle, rgba(235,235,235,.46) 0%, rgba(190,190,190,.22) 36%, rgba(120,120,120,0) 72%);
    animation:rashoSmokePuff 1.65s ease-out forwards;
    animation-delay:calc(var(--i) * .13s + .22s);
  }
  .smoke:nth-child(1){left:5%}
  .smoke:nth-child(2){left:17%}
  .smoke:nth-child(3){left:29%}
  .smoke:nth-child(4){left:43%}
  .smoke:nth-child(5){left:55%}
  .smoke:nth-child(6){left:68%}
  .smoke:nth-child(7){left:80%}
  .rashoGroundSmoke{
    position:absolute;
    left:50%;
    top:66%;
    width:min(86vw,680px);
    height:26px;
    border-radius:50%;
    transform:translateX(-50%) scale(.65);
    opacity:0;
    background:radial-gradient(ellipse, rgba(255,255,255,.22), rgba(255,196,0,.11) 34%, transparent 70%);
    filter:blur(6px);
    animation:rashoGroundSmoke 1.1s ease .85s forwards;
  }
  .rashoLightning{
    position:absolute;
    left:50%;
    top:47%;
    width:min(88vw,780px);
    height:7px;
    transform:translateX(-145%) rotate(-7deg);
    border-radius:999px;
    opacity:0;
    background:linear-gradient(90deg, transparent, #fff, var(--rasho-gold), #fff, transparent);
    filter:drop-shadow(0 0 12px #fff) drop-shadow(0 0 22px rgba(255,196,0,.95));
    animation:rashoLightningSweep .62s ease 1.35s forwards;
  }
  .rashoLightning::before,.rashoLightning::after{
    content:"";
    position:absolute;
    height:5px;
    border-radius:999px;
    background:linear-gradient(90deg, transparent, #fff, var(--rasho-gold), transparent);
    filter:drop-shadow(0 0 12px rgba(255,196,0,.9));
  }
  .rashoLightning::before{width:28%;left:30%;top:-22px;transform:rotate(18deg)}
  .rashoLightning::after{width:22%;right:25%;top:18px;transform:rotate(-22deg)}
  .electricSpark{
    position:absolute;
    width:9px;
    height:9px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 14px #fff,0 0 28px var(--rasho-gold);
    opacity:0;
    animation:rashoSparkFly .95s ease-out forwards;
    animation-delay:var(--d);
  }
  .s1{left:18%;top:35%;--x:50px;--y:-46px;--d:1.22s}
  .s2{left:78%;top:40%;--x:-56px;--y:42px;--d:1.38s}
  .s3{left:35%;top:62%;--x:-48px;--y:-48px;--d:1.56s}
  .s4{left:62%;top:28%;--x:42px;--y:52px;--d:1.68s}
  .rashoFinalGlow{
    position:absolute;
    left:50%;
    top:50%;
    width:min(92vw,760px);
    height:160px;
    transform:translate(-50%,-50%) scale(.7);
    border-radius:50%;
    opacity:0;
    background:radial-gradient(ellipse, rgba(255,196,0,.22), rgba(255,0,0,.13) 36%, transparent 72%);
    filter:blur(16px);
    animation:rashoFinalGlow .55s ease 1.85s forwards;
  }
  .rashoFlash{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:white;
    opacity:0;
    animation:rashoFlash .36s ease 2.25s forwards;
  }
  .rashoLoginHidden{opacity:0;transform:scale(1.025);pointer-events:none}
  .rashoLoginVisible{opacity:1;transform:scale(1);pointer-events:auto;transition:.45s ease}

  @keyframes rashoSpeedLines{to{transform:translateX(16%) skewX(-18deg)}}
  @keyframes rashoLetterSmokeIn{
    0%{opacity:0;transform:translateX(-28px) translateY(28px) scale(.72) skewX(-12deg);filter:blur(4px)}
    70%{opacity:1;transform:translateX(4px) translateY(-3px) scale(1.04) skewX(-10deg);filter:blur(0)}
    100%{opacity:1;transform:translateX(0) translateY(0) scale(1) skewX(-10deg);filter:blur(0)}
  }
  @keyframes rashoSmokePuff{
    0%{opacity:0;transform:translateY(20px) scale(.45)}
    18%{opacity:.85}
    100%{opacity:0;transform:translateY(-82px) translateX(18px) scale(1.55)}
  }
  @keyframes rashoGroundSmoke{
    0%{opacity:0;transform:translateX(-50%) scale(.65)}
    35%{opacity:.85}
    100%{opacity:0;transform:translateX(-50%) scale(1.18)}
  }
  @keyframes rashoLightningSweep{
    0%{opacity:0;transform:translateX(-145%) rotate(-7deg)}
    22%{opacity:1}
    100%{opacity:0;transform:translateX(45%) rotate(-7deg)}
  }
  @keyframes rashoSparkFly{
    0%{opacity:0;transform:translate(0,0) scale(.4)}
    18%{opacity:1}
    100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.2)}
  }
  @keyframes rashoFinalGlow{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  @keyframes rashoFlash{0%,100%{opacity:0}45%{opacity:.42}}
  @media(max-width:640px){
    .rashoIntroStage{height:55vh}
    .rashoWord{font-size:clamp(43px,13vw,74px);gap:4px}
    .smokeLayer{top:57%;height:100px}
    .smoke{width:56px;height:56px}
    .rashoSkip{top:12px;right:12px;padding:9px 13px}
  }
</style>

<section class="rashoIntroClean" id="rashoIntroClean">
  <button class="rashoSkip" id="rashoSkip" type="button">Saltar intro</button>
  <div class="rashoIntroStage">
    <div class="rashoFinalGlow"></div>
    <div class="rashoGroundSmoke"></div>
    <div class="rashoWord" aria-label="EL RASHO">
      <span style="--i:0">E</span>
      <span style="--i:1">L</span>
      <span class="space"></span>
      <span style="--i:2">R</span>
      <span style="--i:3">A</span>
      <span style="--i:4">S</span>
      <span style="--i:5">H</span>
      <span style="--i:6">O</span>
    </div>
    <div class="smokeLayer" aria-hidden="true">
      <i class="smoke" style="--i:0"></i>
      <i class="smoke" style="--i:1"></i>
      <i class="smoke" style="--i:2"></i>
      <i class="smoke" style="--i:3"></i>
      <i class="smoke" style="--i:4"></i>
      <i class="smoke" style="--i:5"></i>
      <i class="smoke" style="--i:6"></i>
    </div>
    <div class="rashoLightning"></div>
    <i class="electricSpark s1"></i>
    <i class="electricSpark s2"></i>
    <i class="electricSpark s3"></i>
    <i class="electricSpark s4"></i>
  </div>
  <div class="rashoFlash"></div>
</section>

<section class="login-page rashoLoginHidden" id="rashoLoginPanel">
  <div class="login-card">
    <div class="login-logo">
      <span class="bolt">⚡</span>
      <div>
        <h1>El Rasho</h1>
        <p>Ingreso al sistema</p>
      </div>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="form-grid">
      <label>
        Usuario
        <input type="text" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
      </label>
      <label>
        Contraseña
        <input type="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary btn-full" type="submit">Entrar</button>
    </form>
    <p class="login-note">Admin maestro, conductores y pasajeros ingresan desde esta misma pantalla.</p>
  </div>
</section>

<script>
  (function(){
    const intro = document.getElementById('rashoIntroClean');
    const login = document.getElementById('rashoLoginPanel');
    const skip = document.getElementById('rashoSkip');
    function showLogin(){
      if(intro){ intro.classList.add('is-hidden'); }
      if(login){
        login.classList.remove('rashoLoginHidden');
        login.classList.add('rashoLoginVisible');
      }
    }
    if(skip){ skip.addEventListener('click', showLogin); }
    setTimeout(showLogin, 2850);
  })();
</script>
{% endblock %}
