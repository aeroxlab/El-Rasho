{% extends 'base.html' %}
{% block content %}
<style>
  .main-login{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:22px;
    overflow:hidden;
    background:
      radial-gradient(circle at 18% 16%, rgba(255,196,0,.16), transparent 26%),
      radial-gradient(circle at 80% 10%, rgba(225,6,0,.20), transparent 30%),
      linear-gradient(135deg,#050505 0%,#210101 52%,#050505 100%);
  }
  .login-page{
    min-height:auto !important;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:0;
    opacity:1 !important;
    animation:none !important;
  }
  .login-card{
    position:relative;
    overflow:hidden;
    isolation:isolate;
    border-color:rgba(255,196,0,.38);
    box-shadow:
      0 24px 70px rgba(0,0,0,.50),
      0 0 34px rgba(255,196,0,.18),
      0 0 54px rgba(225,6,0,.20);
    animation:rashoLoginGlow 2.7s ease-in-out infinite alternate;
  }
  .login-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    z-index:-2;
    border-radius:inherit;
    background:
      conic-gradient(from 120deg,
        transparent 0deg,
        rgba(255,196,0,.0) 42deg,
        rgba(255,196,0,.75) 52deg,
        rgba(255,255,255,.88) 57deg,
        rgba(255,123,0,.70) 64deg,
        transparent 78deg,
        transparent 180deg,
        rgba(225,6,0,.40) 214deg,
        rgba(255,196,0,.60) 225deg,
        transparent 245deg,
        transparent 360deg);
    filter:blur(8px);
    opacity:.68;
    animation:rashoBorderFlash 3.4s linear infinite;
  }
  .login-card::after{
    content:"";
    position:absolute;
    left:-25%;
    top:20%;
    width:55%;
    height:4px;
    border-radius:999px;
    background:linear-gradient(90deg,transparent,#fff,var(--yellow),transparent);
    filter:drop-shadow(0 0 10px #fff) drop-shadow(0 0 18px var(--yellow));
    opacity:.0;
    transform:rotate(-12deg);
    animation:rashoMiniRay 2.6s ease-in-out infinite;
  }
  .login-logo .bolt{
    animation:rashoBoltPulse 1.8s ease-in-out infinite alternate;
  }
  @keyframes rashoLoginGlow{
    from{box-shadow:0 24px 70px rgba(0,0,0,.50),0 0 24px rgba(255,196,0,.13),0 0 44px rgba(225,6,0,.15)}
    to{box-shadow:0 24px 70px rgba(0,0,0,.50),0 0 42px rgba(255,196,0,.30),0 0 70px rgba(225,6,0,.26)}
  }
  @keyframes rashoBorderFlash{to{transform:rotate(360deg)}}
  @keyframes rashoMiniRay{
    0%,65%,100%{opacity:0;left:-35%}
    74%{opacity:.95}
    88%{opacity:0;left:92%}
  }
  @keyframes rashoBoltPulse{
    from{filter:drop-shadow(0 0 4px rgba(255,196,0,.55));transform:scale(1)}
    to{filter:drop-shadow(0 0 16px rgba(255,196,0,.95));transform:scale(1.04)}
  }
</style>

<section class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="bolt">⚡</span>
      <div>
        <h1>El Rasho</h1>
        <p>Ingreso al sistema</p>
      </div>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="form-grid">
      <label>
        Usuario
        <input type="text" name="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
      </label>
      <label>
        Contraseña
        <input type="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
      </label>
      <button class="btn btn-primary btn-full" type="submit">Entrar</button>
    </form>
    <p class="login-note">Admin maestro, conductores y pasajeros ingresan desde esta misma pantalla.</p>
  </div>
</section>
{% endblock %}
